name: Claude Code (reusable)

on:
  workflow_call:
    inputs:
      prompt:
        description: "Optional explicit prompt. When empty, the action auto-detects the request from the triggering event (e.g., @claude mentions)."
        required: false
        type: string
        default: ""
      allowed_bots:
        description: "Comma-separated list of bot usernames allowed to trigger Claude, or '*' for all. Default empty rejects all bots."
        required: false
        type: string
        default: ""
      exclude_comments_by_actor:
        description: "Comma-separated list of actors whose comments Claude should ignore when building context. Defaults to excluding claude[bot] to prevent self-reply loops."
        required: false
        type: string
        default: "claude[bot]"
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  claude:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Fetch system prompt
        run: |
          curl -fsSL https://raw.githubusercontent.com/jl-cmd/claude-code-config/main/packages/claude-dev-env/system-prompts/software-engineer.xml \
            -o /tmp/system-prompt.xml

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--system-prompt-file /tmp/system-prompt.xml"
          prompt: ${{ inputs.prompt }}
          allowed_bots: ${{ inputs.allowed_bots }}
          exclude_comments_by_actor: ${{ inputs.exclude_comments_by_actor }}
          track_progress: true
