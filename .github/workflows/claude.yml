name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened]

jobs:
  run:
    if: |
      contains(github.event.comment.body, '@claude') ||
      contains(github.event.review.body, '@claude') ||
      contains(github.event.issue.body, '@claude') ||
      (
        github.event.sender.login == 'cursor[bot]' &&
        (
          (
            contains(github.event.comment.body, '<!-- BUGBOT_REVIEW -->') &&
            !contains(github.event.comment.body, 'found no new issues')
          ) ||
          (
            contains(github.event.review.body, '<!-- BUGBOT_REVIEW -->') &&
            !contains(github.event.review.body, 'found no new issues')
          )
        )
      )
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    uses: jl-cmd/claude-code-config/.github/workflows/claude-reusable.yml@main
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
